name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel any in-progress run for the same ref when a new commit is pushed.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings
  # Redundant with GitHub Actions' default CI=true (insta already keys off
  # that), but explicit is friendlier to anyone reading the workflow.
  INSTA_UPDATE: "no"

jobs:
  check:
    name: fmt / clippy / test / deny
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # Safety belt: live tests are gated by FERRO_PROTECT_LIVE_* env vars
      # and would happily hit a real NVR if any of them leaked into the
      # runner environment (e.g. via a repo secret misconfigured as a var).
      # Fail loud and early instead.
      - name: Forbid live-test env vars in CI
        run: |
          if env | grep -q '^FERRO_PROTECT_LIVE_'; then
            echo "::error::FERRO_PROTECT_LIVE_* env vars must not be set in CI" >&2
            env | grep '^FERRO_PROTECT_LIVE_' >&2 || true
            exit 1
          fi

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: cargo fmt
        run: cargo fmt --all -- --check

      - name: cargo clippy
        run: cargo clippy --locked --all-targets --all-features -- -D warnings

      - name: cargo test
        run: cargo test --locked --all

      - name: Install cargo-deny
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny

      - name: cargo deny check
        run: cargo deny --locked check
