name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel any in-progress run for the same ref when a new commit is pushed.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings
  # Redundant with GitHub Actions' default CI=true (insta already keys off
  # that), but explicit is friendlier to anyone reading the workflow.
  INSTA_UPDATE: "no"

jobs:
  check:
    name: fmt / clippy / test / deny
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: cargo fmt
        run: cargo fmt --all -- --check

      - name: cargo clippy
        run: cargo clippy --locked --all-targets --all-features -- -D warnings

      - name: cargo test
        run: cargo test --locked --all

      - name: Install cargo-deny
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny

      - name: cargo deny check
        run: cargo deny --locked check
